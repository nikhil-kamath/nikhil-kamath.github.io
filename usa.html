<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poetry Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        h1 {
            font-family: Arial, sans-serif;
            font-size: 32px;
            text-align: center;
            margin-bottom: 20px;
        }

        p {
            font-family: Arial, sans-serif;
            font-size: 18px;
            text-align: center;
            line-height: 1.5;
            max-width: 600px;
            margin: 0 auto;
        }
    </style>
</head>

<body>
    <h1 id="poemTitle">Poem Title</h1>
    <p id="poemBody">
        Loading...
    </p>

    <script>
        // Get the key from the URL
        const urlParams = new URLSearchParams(window.location.search);
        const key = urlParams.get('key');

        // Fetch the poem content based on the key
        fetch(`./poems.json`)
            .then(response => response.json())
            .then(data => {
                const poem = data['usa']
                document.getElementById('poemTitle').innerText = data.title;
                document.getElementById('poemBody').innerText = "hello";
            })
            .catch(error => console.error('Error:', error));
    </script>
</body>

</html>
